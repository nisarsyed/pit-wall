name: pipeline

on:
  push:
    branches: [main]
    paths:
      - "data-pipeline/**"
      - ".github/workflows/pipeline.yml"
  pull_request:
    paths:
      - "data-pipeline/**"
      - ".github/workflows/pipeline.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data-pipeline
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync deps
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run mypy pipeline

      - name: Test
        run: uv run pytest -v
