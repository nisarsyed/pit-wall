name: backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync deps
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run mypy pit_wall

      - name: Test
        run: uv run pytest -v

      - name: Docker build (smoke)
        run: docker build -t pit-wall-api:ci .
