<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-label="Pit Wall architecture diagram">
  <style>
    .bg { fill: #0a0a0a; }
    .node { fill: #13161a; stroke: #2e343b; stroke-width: 1; }
    .accent { fill: #ff1801; }
    .label { font: 600 13px ui-sans-serif, system-ui, sans-serif; fill: #e8e8ea; }
    .sub { font: 11px ui-monospace, monospace; fill: #a1a1aa; text-transform: uppercase; letter-spacing: 0.1em; }
    .arrow { stroke: #71717a; stroke-width: 1.5; fill: none; }
    .arrow-label { font: 10px ui-monospace, monospace; fill: #a1a1aa; }
  </style>
  <rect class="bg" width="900" height="420"/>

  <!-- FastF1 -->
  <g transform="translate(40, 40)">
    <rect class="node" width="180" height="70" rx="6"/>
    <text class="sub" x="90" y="22" text-anchor="middle">Source</text>
    <text class="label" x="90" y="48" text-anchor="middle">FastF1</text>
  </g>

  <!-- Pipeline -->
  <g transform="translate(40, 160)">
    <rect class="node" width="180" height="70" rx="6"/>
    <text class="sub" x="90" y="22" text-anchor="middle">Offline · Python</text>
    <text class="label" x="90" y="48" text-anchor="middle">data-pipeline</text>
  </g>

  <!-- curves.json -->
  <g transform="translate(40, 280)">
    <rect class="node" width="180" height="70" rx="6"/>
    <text class="sub" x="90" y="22" text-anchor="middle">Artifact · Git</text>
    <text class="label" x="90" y="48" text-anchor="middle">curves.json</text>
  </g>

  <!-- Backend -->
  <g transform="translate(360, 160)">
    <rect class="node" width="220" height="70" rx="6"/>
    <text class="sub" x="110" y="22" text-anchor="middle">Runtime · Fly.io (LHR)</text>
    <text class="label" x="110" y="48" text-anchor="middle">FastAPI backend</text>
  </g>

  <!-- Frontend -->
  <g transform="translate(680, 160)">
    <rect class="node" width="180" height="70" rx="6"/>
    <text class="sub" x="90" y="22" text-anchor="middle">Runtime · Vercel</text>
    <text class="label" x="90" y="48" text-anchor="middle">Next.js frontend</text>
  </g>

  <!-- Browser -->
  <g transform="translate(680, 280)">
    <rect class="node" width="180" height="70" rx="6"/>
    <text class="sub" x="90" y="22" text-anchor="middle">Client</text>
    <text class="label" x="90" y="48" text-anchor="middle">Browser</text>
  </g>

  <!-- Arrows -->
  <!-- FastF1 -> pipeline -->
  <path class="arrow" d="M 130 110 L 130 160" marker-end="url(#arrow)"/>
  <!-- pipeline -> curves.json -->
  <path class="arrow" d="M 130 230 L 130 280" marker-end="url(#arrow)"/>
  <!-- curves.json -> backend -->
  <path class="arrow" d="M 220 315 C 280 315, 280 195, 360 195" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="290" y="275" text-anchor="middle">startup load</text>
  <!-- backend -> frontend (simulate) -->
  <path class="arrow" d="M 580 195 L 680 195" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="630" y="186" text-anchor="middle">/simulate</text>
  <!-- frontend -> browser -->
  <path class="arrow" d="M 770 230 L 770 280" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#71717a"/>
    </marker>
  </defs>

  <!-- F1 red accent dot bottom right -->
  <circle class="accent" cx="860" cy="400" r="2"/>
</svg>
